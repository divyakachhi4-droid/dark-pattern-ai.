<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #0B1020;
      color: #F8FAFC;
      margin: 0;
      padding: 16px;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px dashed #334155;
      padding-bottom: 10px;
    }
    .title {
      font-size: 14px;
      font-weight: bold;
      color: #22D3EE;
    }
    .badge {
      font-size: 8px;
      font-weight: bold;
      background-color: #8B5CF6;
      padding: 2px 6px;
      border-radius: 9999px;
      text-transform: uppercase;
    }
    .card {
      background-color: #0F172A;
      border: 2px solid #F97316;
      border-radius: 8px;
      padding: 12px;
      box-shadow: 3px 3px 0px 0px #F97316;
    }
    .scan-btn {
      width: 100%;
      background-color: #8B5CF6;
      color: white;
      border: 2px solid white;
      border-radius: 6px;
      padding: 10px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 2px 2px 0px 0px white;
      transition: all 0.1s ease;
    }
    .scan-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 0px 0px 0px 0px white;
    }
    .results {
      display: none;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
    }
    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
    }
    .score-value {
      font-size: 18px;
      font-weight: black;
      color: #10B981;
    }
    .pattern-item {
      background-color: #1E293B;
      border-left: 3px solid #EF4444;
      padding: 6px 8px;
      font-size: 10px;
      border-radius: 4px;
    }
    .status-text {
      font-size: 11px;
      text-align: center;
      color: #94A3B8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title">AI Dark Pattern Scan</div>
      <div class="badge">Team Agastya</div>
    </div>

    <div class="card">
      <button id="scan-btn" class="scan-btn">Scan Active Tab</button>
      <div id="status" class="status-text" style="margin-top: 10px;">Ready to audit elements...</div>
    </div>

    <div id="results" class="results">
      <div class="score-row">
        <span>UX Ethical Score:</span>
        <span id="score-val" class="score-value">87%</span>
      </div>
      <div id="pattern-list" style="display: flex; flex-direction: column; gap: 6px;">
        <!-- Injected patterns -->
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
